version: '3.8'

services:
  web:
    build: .
    container_name: my-web-server
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=app_password
      - POSTGRES_DB=app_db
    depends_on:
      - db
    restart: on-failure

  db:
    image: postgres:16-alpine
    container_name: my-postgres-db
    environment:
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=app_password
      - POSTGRES_DB=app_db
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data: